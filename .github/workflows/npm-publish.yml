name: NPM Publish 🚀

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"

      - name: Verify NPM Token Presence 🛡️
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "NPM_TOKEN is MISSING! ❌ (Please check your GitHub Secrets)"
            exit 1
          else
            echo "NPM_TOKEN is Present! ✅ (NPM will see it)"
          fi

      - name: Install Dependencies
        run: npm install


      - name: Publish to NPM
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
